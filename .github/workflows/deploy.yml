name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          # URL of the Cloudflare Worker proxy — set in repo Settings → Secrets → Actions.
          # The Anthropic API key lives in the worker as a secret, NOT here.
          # Never add VITE_ANTHROPIC_API_KEY to this workflow — it would embed the key in the bundle.
          VITE_PROXY_URL: ${{ secrets.VITE_PROXY_URL }}
          # Sets the base path to /repo-name/ so asset URLs resolve correctly on GitHub Pages.
          VITE_BASE_PATH: /${{ github.event.repository.name }}/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
