<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Map Assistant</title>
    <!--
      Content Security Policy — restricts which resources the page may load.
      'unsafe-eval' is required by the ArcGIS Maps SDK (dynamic module loading).
      'unsafe-inline' for styles is required by the ArcGIS/Calcite Web Components.
      Tighten these if Esri ships a version that no longer needs them.
    -->
    <meta http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src 'self' https://js.arcgis.com 'unsafe-eval';
        style-src 'self' 'unsafe-inline' https://js.arcgis.com;
        connect-src 'self'
          https://*.arcgis.com
          https://*.arcgisonline.com
          https://*.workers.dev
          wss://*.arcgis.com;
        img-src 'self' data: blob:
          https://*.arcgis.com
          https://*.arcgisonline.com;
        font-src 'self' data: https://js.arcgis.com;
        worker-src 'self' blob:;
        frame-src 'none';
      " />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        overflow: hidden;
      }
      calcite-shell {
        height: 100%;
      }
      #center-content {
        display: flex;
        flex-direction: column;
        height: 100%;
        overflow: hidden;
      }
      arcgis-map {
        flex: 1;
        min-height: 0;
        width: 100%;
      }
      #feature-table-panel {
        flex-shrink: 0;
        height: 260px;
        display: none;
        flex-direction: column;
        border-top: 2px solid var(--calcite-color-border-1);
      }
      #feature-table-toolbar {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 0 8px;
        height: 42px;
        background: var(--calcite-color-foreground-1);
        border-bottom: 1px solid var(--calcite-color-border-1);
        flex-shrink: 0;
      }
      #selection-banner {
        display: none;
        align-items: center;
        gap: 8px;
        padding: 6px 12px;
        background: var(--calcite-color-foreground-2);
        border-bottom: 1px solid var(--calcite-color-border-1);
        font-size: 0.8125rem;
        color: var(--calcite-color-text-2);
        flex-shrink: 0;
      }
      #selection-banner-text {
        flex: 1;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      #feature-table-toolbar span {
        font-size: 0.875rem;
        font-weight: 600;
        color: var(--calcite-color-text-1);
      }
      #layer-picker {
        min-width: 200px;
      }
      arcgis-feature-table {
        flex: 1;
        min-height: 0;
        width: 100%;
      }
    </style>
    <!-- ArcGIS Maps SDK for JavaScript 5.0 (CDN) — includes calcite, map components, and AI components -->
    <script type="module" src="https://js.arcgis.com/5.0/"></script>
  </head>
  <body>
    <calcite-shell>

      <!-- ── Map + Feature Table (flex column) ────────────────────────── -->
      <!-- item-id is set via JavaScript after OAuth is registered to avoid a
           race condition where the map requests auth before SSO is configured -->
      <div id="center-content">
        <arcgis-map id="main-map">
          <arcgis-zoom slot="top-left"></arcgis-zoom>
          <arcgis-home slot="top-left"></arcgis-home>
          <arcgis-expand slot="top-left">
            <arcgis-legend></arcgis-legend>
          </arcgis-expand>
          <arcgis-expand slot="top-right">
            <arcgis-layer-list></arcgis-layer-list>
          </arcgis-expand>
          <arcgis-expand slot="top-right">
            <arcgis-basemap-gallery></arcgis-basemap-gallery>
          </arcgis-expand>
          <!-- Selection tools — bottom-left of the map, styled to match native widgets -->
          <div slot="bottom-left" style="
              display:flex;
              flex-direction:column;
              margin:0 0 8px 8px;
              background:var(--calcite-color-foreground-1,#fff);
              border-radius:4px;
              box-shadow:0 1px 2px rgba(0,0,0,0.3);
              overflow:hidden;">
            <calcite-action
              id="select-rect-btn"
              icon="extent"
              text="Select by rectangle"
              title="Draw a rectangle to select features"
              scale="m">
            </calcite-action>
            <calcite-action
              id="clear-sel-btn"
              icon="erase"
              text="Clear selection"
              title="Clear selected features"
              scale="m"
              disabled>
            </calcite-action>
          </div>
        </arcgis-map>

        <!-- Feature table — revealed after the view is ready -->
        <div id="feature-table-panel">
          <div id="feature-table-toolbar">
            <span>Feature Table</span>
            <calcite-select id="layer-picker" label="Select layer"></calcite-select>
            <calcite-action
              id="collapse-table-btn"
              icon="chevron-down"
              text="Collapse"
              style="margin-left: auto;">
            </calcite-action>
          </div>
          <arcgis-feature-table id="feature-table" reference-element="#main-map" attachments-enabled></arcgis-feature-table>
        </div>
      </div>

      <!-- ── AI Assistant side panel ────────────────────────────────────── -->
      <calcite-shell-panel slot="panel-end" width="l" id="assistant-shell-panel" collapsed resizable>
        <calcite-action-bar slot="action-bar" expand-disabled>
          <calcite-action
            id="assistant-toggle"
            text="AI Map Assistant"
            icon="speech-bubbles">
          </calcite-action>
        </calcite-action-bar>

        <calcite-panel heading="AI Map Assistant">
          <calcite-action
            slot="header-actions-end"
            icon="reset"
            text="Reset map"
            id="reset-map-btn">
          </calcite-action>
          <calcite-tooltip reference-element="reset-map-btn">
            Restore all layer filters and visibility to their original state
          </calcite-tooltip>
          <calcite-action
            slot="header-actions-end"
            icon="erase"
            text="Clear chat"
            id="clear-chat-btn">
          </calcite-action>
          <calcite-tooltip reference-element="clear-chat-btn">
            Clear the conversation and start a new session with the assistant
          </calcite-tooltip>
          <!-- Selection status banner — hidden until features are selected -->
          <div id="selection-banner">
            <span id="selection-banner-text"></span>
            <calcite-button
              id="selection-banner-clear"
              scale="s"
              appearance="transparent"
              kind="neutral"
              icon-start="x">
              Clear
            </calcite-button>
          </div>

          <arcgis-assistant
            id="assistant"
            log-enabled
            copy-enabled
            reference-element="#main-map"
            heading="AI Map Assistant (Beta)"
            description="Ask questions about this map in natural language."
            entry-message="Hello! I can help you explore this map. Try asking me to navigate somewhere, describe what the data shows, or answer questions about the features.">

            <!-- Built-in agents: navigate the map, explore data, answer help Qs -->
            <arcgis-assistant-navigation-agent></arcgis-assistant-navigation-agent>
            <arcgis-assistant-data-exploration-agent></arcgis-assistant-data-exploration-agent>
            <arcgis-assistant-help-agent></arcgis-assistant-help-agent>


          </arcgis-assistant>
        </calcite-panel>
      </calcite-shell-panel>

    </calcite-shell>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
